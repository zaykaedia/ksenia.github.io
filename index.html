<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Для Ксении ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    .card {
      text-align: center;
      padding: 30px;
      border-radius: 25px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      max-width: 400px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 25px;
    }

    button {
      padding: 14px 28px;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      margin: 10px;
      transition: 0.2s;
      font-weight: bold;
    }

    #yes {
      background: white;
      color: #ff4f7b;
    }

    #yes:hover {
      transform: scale(1.1);
    }

    #no {
      position: absolute;
      background: #ff4f7b;
      color: white;
    }

    .hidden {
      display: none;
    }

    .love {
      font-size: 28px;
      font-weight: bold;
      animation: pop 0.5s ease;
    }

    @keyframes pop {
      from {opacity:0; transform: scale(0.5);}
      to {opacity:1; transform: scale(1);}
    }

    .heart {
      position: absolute;
      bottom: -20px;
      font-size: 24px;
      animation: fly 5s linear infinite;
    }

    @keyframes fly {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div class="card" id="questionBox">
  <h1>Ты любишь своего брата?</h1>
  <button id="yes" onclick="yesClick()">ДА</button>
  <button id="no" onclick="moveNo()">НЕТ</button>
</div>

<div class="card hidden" id="resultBox">
  <div class="love">
    🎉 Поздравляю, Ксения!<br>
    Вы обрели самого лучшего брата ❤️
  </div>
</div>

<!-- музыка -->
<audio id="music" src="music.mp3" loop></audio>

<script>
const noBtn = document.getElementById("no");

// убегающая кнопка
function moveNo() {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  noBtn.style.position = "fixed";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

// клик ДА
function yesClick() {
  const audio = document.getElementById("music");

  audio.volume = 1.0;
  audio.play();

  document.getElementById("questionBox").classList.add("hidden");
  document.getElementById("resultBox").classList.remove("hidden");

  startHearts();
}

// сердечки
function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random()*20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 200);
}
</script>

</body>
</html>
