<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сообщение 💌</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

.card {
  text-align: center;
  padding: 30px;
  border-radius: 25px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

h1 {
  margin-bottom: 20px;
}

button {
  padding: 14px 28px;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  cursor: pointer;
  margin: 10px;
  font-weight: bold;
}

#good {
  background: white;
  color: #2575fc;
}

#bad {
  position: absolute;
  background: #ff4f7b;
  color: white;
}
</style>
</head>

<body>

<div class="card">
  <h1>Привет стасик, как дела?</h1>
  <button id="good">Отлично</button>
  <button id="bad">Плохо</button>
</div>

<!-- музыка -->
<audio id="music" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const badBtn = document.getElementById("bad");
const goodBtn = document.getElementById("good");
const audio = document.getElementById("music");

// кнопка "плохо" убегает
badBtn.addEventListener("click", () => {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  badBtn.style.position = "fixed";
  badBtn.style.left = x + "px";
  badBtn.style.top = y + "px";
});

// кнопка "отлично" включает музыку
goodBtn.addEventListener("click", async () => {
  try {
    audio.volume = 1.0;
    await audio.play();
  } catch (e) {
    audio.muted = true;
    await audio.play();
    audio.muted = false;
  }
});
</script>

</body>
</html>
